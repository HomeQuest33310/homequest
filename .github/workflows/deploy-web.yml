name: Deploy HomeQuest Web

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: homequest-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter-quality:
    name: Flutter quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Configure isolated test environment
        working-directory: app
        run: |
          cat > .env <<EOF
          SUPABASE_URL=http://127.0.0.1:54321
          SUPABASE_ANON_KEY=test-anon-key
          APP_PUBLIC_URL=http://localhost
          EOF

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Analyze
        working-directory: app
        run: flutter analyze --fatal-infos

      - name: Test
        working-directory: app
        run: flutter test --coverage

      - name: Enforce initial coverage floor
        working-directory: app
        run: |
          awk -F: '
            /^LF:/ { found += $2 }
            /^LH:/ { hit += $2 }
            END {
              coverage = found == 0 ? 0 : (100 * hit / found)
              printf "Line coverage: %.1f%% (%d/%d)\n", coverage, hit, found
              if (coverage < 20) exit 1
            }
          ' coverage/lcov.info

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: app/coverage/lcov.info
          if-no-files-found: error

  database-quality:
    name: Supabase quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.109.1
          github-token: ${{ github.token }}

      - name: Rebuild database from migrations
        run: |
          supabase db start
          supabase db reset --local --yes

      - name: Test database contracts and permissions
        run: supabase test db

      - name: Lint database functions
        run: |
          supabase db lint --local --schema public \
            --level warning --fail-on error

  build:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: [flutter-quality, database-quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Configure application
        working-directory: app
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_PUBLISHABLE_KEY"
          cat > .env <<EOF
          SUPABASE_URL=$SUPABASE_URL
          SUPABASE_ANON_KEY=$SUPABASE_PUBLISHABLE_KEY
          APP_PUBLIC_URL=https://homequest33310.github.io/homequest/
          EOF

      - name: Build Flutter Web
        working-directory: app
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          flutter pub get
          flutter build web --release --base-href /homequest/ \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_PUBLISHABLE_KEY" \
            --dart-define=APP_PUBLIC_URL="https://homequest33310.github.io/homequest/"
          touch build/web/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: app/build/web

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
