name: homequestoria
description: >
  Homequestoria - Transform household chores into epic quests for the whole family.
  An open-source, free family RPG platform built with Flutter and Supabase.
publish_to: 'none'

version: 0.3.5+1

environment:
  sdk: ^3.4.0
  flutter: ">=3.4.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.0

  # Data Models & Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # Supabase Backend
  supabase_flutter: ^2.6.0

  # Local environment configuration
  flutter_dotenv: ^6.0.1

  # Navigation
  go_router: ^13.2.0

  # Image Handling
  image_picker: ^1.0.0

  # Internationalization
  intl: ^0.19.0

  # HTTP Client
  http: ^1.1.0

  # Local Storage
  shared_preferences: ^2.2.2

  # Async
  async: ^2.11.0

  # Utility
  equatable: ^2.0.5
  uuid: ^4.0.0
  collection: ^1.17.2

  # UI/UX
  google_fonts: ^6.1.0
  lottie: ^2.7.0
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

  # Code Generation
  build_runner: ^2.4.6
  freezed: ^2.4.1
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9

  # Testing
  mocktail: ^1.0.0
  # Code Coverage
  coverage: ^1.15.1

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/content/quest_suggestions.md
    - assets/images/opening_gateway.png
    - assets/audio/opening_theme.wav

  # TODO: Add assets later when directories exist
  # assets:
  #   - assets/images/
  #   - assets/icons/
  #   - assets/animations/
  #   - assets/locales/

  # TODO: Add custom fonts later
  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700
  #       - asset: assets/fonts/Poppins-SemiBold.ttf
  #         weight: 600
  #
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700

# Dart Code Metrics
dart_code_metrics:
  rules:
    - avoid-missing-enum-constant-in-map
    - avoid-non-null-assertion
    - avoid-returning-widgets
    - max-lines: 200
    - max-nested-callback-depth: 5
    - prefer-single-widget-per-file
